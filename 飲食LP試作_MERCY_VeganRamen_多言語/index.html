<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERCY Vegan Ramen｜100% Plant-based・Gluten-free・2026.10 OPEN</title>
<meta name="description" content="MERCY Vegan Ramen. 100% plant-based, gluten-free, no five pungent roots. JP / EN / 繁體中文 対応のヴィーガンラーメン。2026年10月オープン。">
<style>
  :root{
    --bg:#f5f7ef; --bg2:#eef2e4; --paper:#fff;
    --ink:#33402d; --ink2:#5c6a52; --soft:#8a9580;
    --green:#5f8a4e; --green-d:#4a7239; --leaf:#7faa63;
    --warm:#e08a4a; --line:#e2e7d6; --cream:#fbf9f1;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",YuGothic,"Microsoft JhengHei","PingFang TC","Meiryo",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.9;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1040px;margin:0 auto;padding:0 22px}
  .demo-badge{position:fixed;bottom:74px;right:10px;z-index:120;background:rgba(51,64,45,.82);
    color:#fff;font-size:10px;letter-spacing:.04em;padding:4px 9px;border-radius:4px}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:110;background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .topbar .row{display:flex;align-items:center;justify-content:space-between;height:62px}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo svg{height:38px;width:auto;display:block}
  .logo img{height:46px;width:auto;display:block}
  .lang{display:flex;gap:4px}
  .lang button{font:inherit;font-size:12px;font-weight:700;border:1px solid var(--line);
    background:#fff;color:var(--ink2);padding:6px 11px;border-radius:30px;cursor:pointer;transition:.15s}
  .lang button.active{background:var(--green);color:#fff;border-color:var(--green)}
  .lang button:hover{border-color:var(--green)}

  /* FV */
  .hero{position:relative;min-height:calc(100svh - 62px);display:flex;align-items:center;
    background:linear-gradient(160deg,#f7f9f0,#e9efdc 60%,#dde7c9);overflow:hidden}
  .hero::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;right:-160px;top:-160px;
    background:radial-gradient(circle at 40% 40%,#cfe0b0,transparent 70%);opacity:.7}
  .hero::after{content:"";position:absolute;width:420px;height:420px;border-radius:50%;left:-150px;bottom:-160px;
    background:radial-gradient(circle at 50% 50%,#d8e6bd,transparent 70%);opacity:.6}
  .hero-inner{position:relative;z-index:2;width:100%;display:grid;grid-template-columns:1.15fr .85fr;gap:30px;align-items:center;padding:40px 0}
  .open-badge{display:inline-block;background:var(--green);color:#fff;font-weight:800;font-size:13px;
    letter-spacing:.14em;padding:7px 16px;border-radius:40px}
  .hero h1{font-size:clamp(28px,5.2vw,50px);font-weight:800;line-height:1.4;margin:20px 0 0;letter-spacing:.02em}
  .hero h1 .g{color:var(--green-d)}
  .hero .sub{margin-top:18px;font-size:clamp(14px,2.4vw,17px);color:var(--ink2);font-weight:500}
  .hero .tags{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
  .hero .tags span{background:#fff;border:1px solid var(--line);color:var(--green-d);font-size:12px;font-weight:700;padding:6px 12px;border-radius:30px}
  .btns{margin-top:26px;display:flex;flex-wrap:wrap;gap:12px}
  .cta{display:inline-block;background:var(--green);color:#fff;font-weight:800;font-size:16px;letter-spacing:.04em;
    padding:15px 30px;border-radius:50px;text-decoration:none;box-shadow:0 10px 22px rgba(95,138,78,.35);transition:.2s}
  .cta:hover{background:var(--green-d);transform:translateY(-2px)}
  .cta.ghost{background:#fff;color:var(--green-d);border:2px solid var(--green);box-shadow:none}
  .hero-visual{aspect-ratio:1/1;border-radius:24px;position:relative;overflow:hidden;
    background:radial-gradient(75% 75% at 50% 38%,#fff7e8,#f0ead7);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center}
  .hero-visual .bowl{font-size:92px}
  .hero-visual .tag{position:absolute;bottom:12px;right:14px;font-size:10px;letter-spacing:.18em;color:#b3ac93}

  section{padding:74px 0}
  .sec-head{text-align:center;margin-bottom:44px}
  .sec-head .en{display:block;color:var(--leaf);font-size:12px;letter-spacing:.34em;font-weight:700;margin-bottom:10px}
  .sec-head h2{font-size:clamp(22px,4.4vw,32px);font-weight:800;letter-spacing:.03em}

  .concept .lead{text-align:center;font-weight:800;font-size:clamp(19px,3.6vw,26px);line-height:1.7;max-width:720px;margin:0 auto 18px}
  .concept p{text-align:center;max-width:660px;margin:0 auto;font-size:clamp(14px,2.6vw,17px);color:var(--ink2)}

  .trust{background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .trust .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .tcard{text-align:center;background:var(--cream);border-radius:16px;padding:30px 18px;border:1px solid var(--line)}
  .tcard .ic{font-size:38px}
  .tcard h3{font-size:17px;font-weight:800;margin:12px 0 8px;color:var(--green-d)}
  .tcard p{font-size:13px;color:var(--ink2)}

  .menu{background:var(--bg2)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .card .ph{aspect-ratio:16/10;position:relative;display:flex;align-items:center;justify-content:center;
    font-size:40px;background:radial-gradient(75% 75% at 50% 35%,#f3eed8,#e7e2cb)}
  .card .ph::after{content:"PHOTO";position:absolute;bottom:8px;right:10px;font-size:9px;letter-spacing:.18em;color:#b3ac93}
  .card .body{padding:18px 20px}
  .card .vtag{display:inline-block;background:#eaf2e0;color:var(--green-d);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:8px}
  .card h3{font-size:17px;font-weight:800}
  .card .price{color:var(--warm);font-weight:800;font-size:14px;margin-top:4px}
  .card p{font-size:13px;color:var(--ink2);margin-top:8px}
  .note-img{text-align:center;color:var(--soft);font-size:12px;margin-top:20px}

  .story{background:var(--paper)}
  .story .box{max-width:760px;margin:0 auto;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:40px clamp(22px,5vw,50px)}
  .story p{font-size:15px;margin-bottom:16px}
  .story p:last-child{margin-bottom:0}
  .story .sign{text-align:right;color:var(--ink2);font-weight:700;font-size:14px}

  .whom{background:var(--bg)}
  .wlist{max-width:680px;margin:0 auto;display:grid;gap:12px}
  .wlist div{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 20px;font-size:15px;font-weight:600}
  .wlist div::before{content:"🌱 "}

  .access{background:var(--bg2)}
  .access .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:center}
  .access dl{font-size:14px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 28px}
  .access dt{color:var(--green-d);font-weight:800;margin-top:14px}
  .access dt:first-child{margin-top:0}
  .access dd{color:var(--ink2)}
  .access .mapph{aspect-ratio:16/11;border-radius:16px;border:1px solid var(--line);
    background:repeating-linear-gradient(45deg,#e7ecdb 0 14px,#dfe6cf 14px 28px);
    display:flex;align-items:center;justify-content:center;color:var(--soft);font-size:13px}

  .faq{background:var(--paper)}
  .faq .item{max-width:760px;margin:0 auto 14px;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:18px 22px}
  .faq .q{font-weight:800;font-size:15px}
  .faq .a{font-size:14px;color:var(--ink2);margin-top:8px}

  .final{background:linear-gradient(160deg,#5f8a4e,#41662f);color:#fff;text-align:center}
  .final h2{font-size:clamp(22px,4.6vw,34px);font-weight:800;line-height:1.5}
  .final p{margin:16px auto 0;color:#eaf3e0;font-size:15px;max-width:560px}
  .final .btns{justify-content:center}
  .final .cta{background:#fff;color:var(--green-d)}
  .final .cta.ghost{background:transparent;color:#fff;border-color:#fff}

  .sticky{position:fixed;left:0;right:0;bottom:0;z-index:100;display:none;background:rgba(255,255,255,.97);
    padding:10px 14px;gap:10px;align-items:center;box-shadow:0 -6px 20px rgba(0,0,0,.12);border-top:1px solid var(--line)}
  .sticky .t{font-size:12px;flex:1;line-height:1.4;color:var(--ink)}
  .sticky .t b{color:var(--green-d)}
  .sticky a{background:var(--green);color:#fff;font-weight:800;text-decoration:none;padding:12px 18px;border-radius:40px;font-size:14px;white-space:nowrap}

  footer{background:#3a4530;color:#b8c2a8;text-align:center;font-size:12px;padding:26px 0}
  footer .flogo{margin-bottom:14px}
  footer .flogo svg{height:34px}
  footer .flogo img{height:70px;width:auto;display:inline-block;
    background:#fff;padding:10px 18px;border-radius:12px}

  @media(max-width:820px){
    .hero-inner{grid-template-columns:1fr}
    .hero-visual{max-width:300px;margin:6px auto 0}
    .trust .cols,.cards{grid-template-columns:1fr}
    .access .grid{grid-template-columns:1fr}
    .sticky{display:flex}
    body{padding-bottom:64px}
    section{padding:56px 0}
  }
</style>
</head>
<body>

<!-- ===== LOGO (reusable SVG) ===== -->
<template id="logoTpl">
<svg viewBox="0 0 250 52" role="img" aria-label="MERCY Vegan Ramen">
  <g>
    <circle cx="26" cy="26" r="24" fill="#5f8a4e"/>
    <path d="M26 11c8 2 13 8 13 16 0 5-3 9-7 11 0-7-2-12-7-16 3 4 4 9 4 15-6-2-10-7-10-14 0-1 0-2 .2-3 1.5 1 3 2.3 4.3 4-1-3-2.6-5.6-4.8-7.7C20 14 23 12 26 11z" fill="#eaf3e0"/>
  </g>
  <text x="60" y="27" font-family="Georgia,'Times New Roman',serif" font-size="26" font-weight="700" letter-spacing="2" fill="#33402d">MERCY</text>
  <text x="61" y="43" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="700" letter-spacing="3.5" fill="#5f8a4e">VEGAN RAMEN</text>
</svg>

<div class="demo-badge">PORTFOLIO DEMO</div>

<!-- top bar -->
<div class="topbar">
  <div class="wrap row">
    <a class="logo" href="#"><span class="logo-slot"></span></a>
    <div class="lang">
      <button data-lang="ja" class="active">日本語</button>
      <button data-lang="en">EN</button>
      <button data-lang="zh">繁中</button>
    </div>
  </div>
</div>

<!-- FV -->
<header class="hero">
  <div class="wrap hero-inner">
    <div>
      <span class="open-badge">2026.10 OPEN</span>
      <h1 data-ja="動物性、ゼロ。&lt;br&gt;うまみは、ぜんぶ&lt;span class='g'&gt;植物&lt;/span&gt;から。"
          data-en="Zero animal products.&lt;br&gt;All the &lt;span class='g'&gt;umami&lt;/span&gt;, from plants."
          data-zh="零動物性。&lt;br&gt;鮮味，&lt;span class='g'&gt;全部來自植物&lt;/span&gt;。"></h1>
      <p class="sub"
        data-ja="100%植物性・グルテンフリー・五葷不使用のヴィーガンラーメン。&lt;br&gt;がまんではなく、おいしいから選ばれる一杯を。"
        data-en="100% plant-based, gluten-free, no five pungent roots.&lt;br&gt;Not a compromise — a bowl chosen because it's delicious."
        data-zh="100%純植物・無麩質・無五辛的純素拉麵。&lt;br&gt;不是將就，而是因為美味而被選擇的一碗。"></p>
      <div class="tags">
        <span data-ja="100% 植物性" data-en="100% Plant-based" data-zh="100% 純植物"></span>
        <span data-ja="グルテンフリー" data-en="Gluten-free" data-zh="無麩質"></span>
        <span data-ja="五葷不使用" data-en="No five pungent roots" data-zh="無五辛"></span>
      </div>
      <div class="btns">
        <a class="cta" href="#open" data-ja="▶ オープンの先行案内を受け取る" data-en="▶ Get opening updates" data-zh="▶ 搶先取得開幕資訊"></a>
        <a class="cta ghost" href="#menu" data-ja="メニューを見る" data-en="View menu" data-zh="查看菜單"></a>
      </div>
    </div>
    <div class="hero-visual"><div class="bowl">🍜🌿</div><span class="tag">MAIN PHOTO</span></div>
  </div>
</header>

<!-- concept -->
<section class="concept">
  <div class="wrap">
    <p class="lead"
      data-ja="「ヴィーガン＝物足りない」を、くつがえす一杯を。"
      data-en="A bowl that breaks the &quot;vegan = not satisfying&quot; myth."
      data-zh="顛覆「純素＝吃不飽」的一碗拉麵。"></p>
    <p data-ja="動物性を使わず、グルテンも五葷も使わない。&lt;br&gt;それでも、深くて満足できる一杯を目指しました。&lt;br&gt;だれもが安心して、おいしく食べられる場所へ。"
       data-en="No animal products, no gluten, no five pungent roots.&lt;br&gt;Still deep, still satisfying.&lt;br&gt;A place where everyone can eat with peace of mind."
       data-zh="不使用動物性、不使用麩質與五辛。&lt;br&gt;依然濃郁、依然滿足。&lt;br&gt;讓每個人都能安心、美味地享用。"></p>
  </div>
</section>

<!-- trust -->
<section class="trust">
  <div class="wrap">
    <div class="sec-head">
      <span class="en">WHY MERCY</span>
      <h2 data-ja="安心して食べられる理由" data-en="Why you can eat with confidence" data-zh="安心享用的理由"></h2>
    </div>
    <div class="cols">
      <div class="tcard"><div class="ic">🥬</div>
        <h3 data-ja="100% 植物性" data-en="100% Plant-based" data-zh="100% 純植物"></h3>
        <p data-ja="肉・魚・卵・乳製品は一切不使用。植物性素材だけで仕上げます。" data-en="No meat, fish, eggs or dairy. Made only with plant-based ingredients." data-zh="不使用肉、魚、蛋、乳製品。只用植物性食材製作。"></p></div>
      <div class="tcard"><div class="ic">🌾</div>
        <h3 data-ja="グルテンフリー" data-en="Gluten-free" data-zh="無麩質"></h3>
        <p data-ja="小麦を使わない麺をご用意。アレルギーが気になる方も。" data-en="Wheat-free noodles available. Great for those with gluten concerns." data-zh="提供無小麥麵條，在意麩質的您也能安心。"></p></div>
      <div class="tcard"><div class="ic">🧄</div>
        <h3 data-ja="五葷不使用" data-en="No five pungent roots" data-zh="無五辛"></h3>
        <p data-ja="にんにく・ねぎ等の五葷も不使用。宗教・信条に配慮した一杯。" data-en="No garlic, onion or other pungent roots. Mindful of religious & dietary needs." data-zh="不使用蒜、蔥等五辛，顧及宗教與飲食需求。"></p></div>
    </div>
  </div>
</section>

<!-- menu -->
<section class="menu" id="menu">
  <div class="wrap">
    <div class="sec-head">
      <span class="en">MENU</span>
      <h2 data-ja="自慢の一杯" data-en="Our signature bowls" data-zh="招牌拉麵"></h2>
    </div>
    <div class="cards">
      <div class="card"><div class="ph">🍜</div><div class="body">
        <span class="vtag" data-ja="看板メニュー" data-en="Signature" data-zh="招牌"></span>
        <h3 data-ja="薬膳豆乳担々麺" data-en="Medicinal Soy Milk Tantan Ramen" data-zh="藥膳豆乳擔擔麵"></h3>
        <div class="price">¥2,200</div>
        <p data-ja="練り胡麻のコクと薬膳のあたたかさ。植物性だけで、奥深い一杯。" data-en="Rich sesame and warming medicinal spices — deep flavor, fully plant-based." data-zh="濃郁芝麻與藥膳的溫潤，純植物也能如此有層次。"></p></div></div>
      <div class="card"><div class="ph">🍅</div><div class="body">
        <span class="vtag" data-ja="人気" data-en="Popular" data-zh="人氣"></span>
        <h3 data-ja="トマトラーメン" data-en="Tomato Ramen" data-zh="番茄拉麵"></h3>
        <div class="price">¥1,980</div>
        <p data-ja="完熟トマトの酸味とうまみ。最後はリゾット風にも。" data-en="Ripe tomato acidity and umami — finish it risotto-style." data-zh="完熟番茄的酸甜與鮮味，最後還能享受燉飯風味。"></p></div></div>
      <div class="card"><div class="ph">🧂</div><div class="body">
        <span class="vtag" data-ja="定番" data-en="Classic" data-zh="經典"></span>
        <h3 data-ja="塩ラーメン" data-en="Shio (Salt) Ramen" data-zh="鹽味拉麵"></h3>
        <div class="price">¥1,650</div>
        <p data-ja="素材の味が際立つ、すっきり澄んだスープ。はじめての一杯に。" data-en="A clear, clean broth where ingredients shine. Perfect for first-timers." data-zh="清澈湯頭凸顯食材原味，第一碗的最佳選擇。"></p></div></div>
    </div>
    <p class="note-img" style="margin-bottom:8px"
       data-ja="▼ ラーメン以外も充実（ヴィーガンフード／スイートベーカリー）"
       data-en="▼ More than ramen (vegan food & sweet bakery)"
       data-zh="▼ 不只拉麵（純素料理／甜點烘焙）"></p>
    <p class="note-img" style="color:var(--ink2)"
       data-ja="車麩の唐揚げカレー ¥1,760 ／ カリフラワーの甘酢揚げ ¥1,210 ／ ヴィーガンクリームコロッケ ¥1,320&lt;br&gt;抹茶プリン ¥660 ／ ガトーショコラ ¥880 ／ クルミのシナモンロール ¥330 など"
       data-en="Fried wheat-gluten curry ¥1,760 / Sweet & sour cauliflower ¥1,210 / Vegan cream croquette ¥1,320&lt;br&gt;Matcha pudding ¥660 / Gâteau chocolat ¥880 / Walnut cinnamon roll ¥330 and more"
       data-zh="車麩唐揚咖哩 ¥1,760／糖醋花椰菜 ¥1,210／純素奶油可樂餅 ¥1,320&lt;br&gt;抹茶布丁 ¥660／巧克力蛋糕 ¥880／核桃肉桂捲 ¥330 等"></p>
    <p class="note-img"
       data-ja="※ MERCY Vegan Ramen のメニューを参考にした構成サンプル。実制作時は料理写真を配置します。"
       data-en="※ Sample layout based on MERCY Vegan Ramen's menu. Real photos to be placed in production."
       data-zh="※ 參考 MERCY Vegan Ramen 菜單的版面範例。實際製作時將置入料理照片。"></p>
  </div>
</section>

<!-- story -->
<section class="story">
  <div class="wrap">
    <div class="sec-head">
      <span class="en">OUR STORY</span>
      <h2 data-ja="“出汁”に、こだわる理由。" data-en="Why we obsess over the broth" data-zh="堅持「湯頭」的理由"></h2>
    </div>
    <div class="box">
      <p data-ja="動物性を使わずに、深い味を出す。&lt;br&gt;これは簡単なことではありませんでした。" data-en="Creating deep flavor without animal products&lt;br&gt;was never easy." data-zh="不使用動物性卻要做出濃郁的味道，&lt;br&gt;這並不容易。"></p>
      <p data-ja="昆布、きのこ、香味野菜。&lt;br&gt;何度も炊いて、ようやく「これだ」という一杯に。&lt;br&gt;食べたあと、からだが軽い。でも、満たされている。" data-en="Kombu, mushrooms, aromatic vegetables.&lt;br&gt;Simmered again and again until we found 'the one.'&lt;br&gt;You feel light afterward — yet completely satisfied." data-zh="昆布、菇類、香味蔬菜。&lt;br&gt;反覆熬煮，終於成就「就是這個」的一碗。&lt;br&gt;吃完身體輕盈，卻又無比滿足。"></p>
      <p data-ja="ヴィーガンの方も、そうでない方も。&lt;br&gt;「また食べたい」と思える一杯を、10月に。" data-en="Vegan or not.&lt;br&gt;A bowl you'll want again — opening this October." data-zh="無論是否為純素者，&lt;br&gt;都會想再次品嚐的一碗，十月見。"></p>
      <p class="sign">— MERCY Vegan Ramen</p>
    </div>
  </div>
</section>

<!-- for whom -->
<section class="whom">
  <div class="wrap">

<script>
  // inject logo: use logo.png if present, otherwise fall back to built-in SVG wordmark
  var logoSvg = document.getElementById('logoTpl').innerHTML;
  function fillLogo(html){ document.querySelectorAll('.logo-slot').forEach(function(s){ s.innerHTML = html; }); }
  (function(){
    var LOGO = 'mrcylogo1.webp';
    var test = new Image();
    test.onload = function(){ fillLogo('<img src="'+LOGO+'" alt="MERCY Vegan Factory">'); };
    test.onerror = function(){ fillLogo(logoSvg); };
    test.src = LOGO + '?_=' + Date.now();
  })();

  // i18n: elements carry data-ja / data-en / data-zh (HTML allowed)
  var nodes = document.querySelectorAll('[data-ja]');
  function setLang(lang){
    nodes.forEach(function(n){
      var v = n.getAttribute('data-'+lang);
      if(v!==null) n.innerHTML = v;
    });
    document.documentElement.lang = (lang==='zh'?'zh-Hant':lang);
    document.querySelectorAll('.lang button').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-lang')===lang);
    });
  }
  document.querySelectorAll('.lang button').forEach(function(b){
    b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang')); });
  });
  setLang('ja'); // default
</script>
